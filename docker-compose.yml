version: "3.9"

services:
  db:
    image: postgres:15
    container_name: expense-db
    restart: always
    environment:
      POSTGRES_DB: ExpenseTrackerDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: ./ExpenseTrackerAPI
    container_name: expense-api
    depends_on:
      db:
        condition: service_healthy
      ocr:
        condition: service_started
      ml:
        condition: service_started
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=ExpenseTrackerDB;Username=postgres;Password=1
      OCR_URL: http://ocr:8002
      ML_URL: http://ml:8001

  ocr:
    build: ./OCRServer
    container_name: ocr-service
    ports:
      - "8002:8002"

  ml:
    build: ./MLServer
    container_name: ml-service
    ports:
      - "8001:8001"

  frontend:
    build: ./expense-tracker-frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
